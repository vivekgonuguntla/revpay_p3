server:
  port: 8085

spring:
  application:
    name: business-service

  datasource:
    url: jdbc:mysql://localhost:3306/revpay_business?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: dileep@123
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

  cloud:
    openfeign:
      client:
        config:
          default:
            connectTimeout: 5000
            readTimeout: 5000

# Feign client URLs
wallet:
  service:
    url: http://localhost:8084

auth:
  service:
    url: http://localhost:8081

card:
  service:
    url: http://localhost:8082

notification:
  service:
    url: http://localhost:8083

# Logging
logging:
  level:
    com.revpay.business: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    feign: DEBUG

# Eureka Client Configuration
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true
    hostname: localhost
